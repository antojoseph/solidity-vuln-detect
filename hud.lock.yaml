tools:
- name: read_code
  description: 'Read the Solidity code snippet under review.


    Returns the smart contract code that may contain a security vulnerability.

    Examine it carefully for common vulnerability patterns like reentrancy,

    access control issues, oracle manipulation, etc.'
  inputSchema:
    properties: {}
    type: object
- name: get_context
  description: 'Get context about the protocol being audited.


    Returns the protocol type and preconditions that describe when this

    vulnerability pattern applies. No reward penalty for using this tool.'
  inputSchema:
    properties: {}
    type: object
- name: list_hints
  description: 'Request detection heuristics for analyzing this code.


    Returns a list of things to look for when auditing this code.

    WARNING: Using hints reduces your maximum reward from 1.0 to 0.7.'
  inputSchema:
    properties: {}
    type: object
- name: submit_finding
  description: "Submit your vulnerability analysis.\n\nArgs:\n    vulnerability_type:\
    \ Category of vulnerability (e.g. 'reentrancy',\n        'oracle manipulation',\
    \ 'access control', 'flash loan',\n        'precision loss', 'denial of service',\
    \ 'frontrunning', etc.)\n    explanation: Detailed explanation of WHY the code\
    \ is vulnerable,\n        including what an attacker could exploit and how.\n\
    \    severity: Impact level \u2014 'HIGH' or 'MEDIUM'.\n    affected_lines: Comma-separated\
    \ line numbers where the root cause is\n        (e.g. '5,6,7'). Use the line numbers\
    \ from read_code()."
  inputSchema:
    properties:
      vulnerability_type:
        type: string
      explanation:
        type: string
      severity:
        default: HIGH
        type: string
      affected_lines:
        default: ''
        type: string
    required:
    - vulnerability_type
    - explanation
    type: object
prompts:
- name: solidity-vuln-detect:detect-vuln
  description: '[Setup] Agent must identify the vulnerability in a Solidity code snippet.'
  arguments:
  - name: scenario_id
    required: false
    description: null
    default: ''
    type: string
  meta:
    code: "@env.scenario(\"detect-vuln\")\nasync def detect_vulnerability(scenario_id:\
      \ str = \"\") -> Any:\n    \"\"\"Agent must identify the vulnerability in a\
      \ Solidity code snippet.\"\"\"\n    global _current, _hints_used, _code_read\n\
      \n    scenarios = _load_scenarios()\n\n    if scenario_id:\n        matches\
      \ = [s for s in scenarios if s[\"id\"] == scenario_id]\n        if not matches:\n\
      \            raise ValueError(f\"Unknown scenario_id: {scenario_id}\")\n   \
      \     _current = matches[0].copy()\n    else:\n        _current = random.choice(scenarios).copy()\n\
      \n    _hints_used = False\n    _code_read = False\n    _current[\"_submission\"\
      ] = None\n\n    protocol_type = _current[\"protocol_type\"]\n\n    # First yield:\
      \ prompt\n    answer = yield (\n        f\"You are a smart contract security\
      \ auditor reviewing a {protocol_type} protocol.\\n\\n\"\n        f\"Instructions:\\\
      n\"\n        f\"1. Use read_code() to examine the Solidity code snippet\\n\"\
      \n        f\"2. Optionally use get_context() for protocol details\\n\"\n   \
      \     f\"3. Optionally use list_hints() for detection guidance (reduces max\
      \ reward)\\n\"\n        f\"4. Use submit_finding() with your analysis when ready\\\
      n\\n\"\n        f\"Your goal: identify the specific vulnerability type, explain\
      \ the attack vector, \"\n        f\"and pinpoint the affected lines of code.\"\
      \n    )\n\n    # Second yield: evaluation\n    submission = _current.get(\"\
      _submission\")\n    if not submission:\n        yield EvaluationResult(\n  \
      \          reward=0.0,\n            done=True,\n            content=\"No finding\
      \ was submitted.\",\n            info={\"scenario_id\": _current[\"id\"]},\n\
      \        )\n        return\n\n    # Score components\n    cat_score = _score_category(\n\
      \        submission[\"vulnerability_type\"],\n        _current[\"category_slug\"\
      ],\n        _current[\"canonical_category\"],\n    )\n    expl_score = _score_explanation(submission[\"\
      explanation\"], _current)\n    sev_score = _score_severity(submission[\"severity\"\
      ], _current)\n    line_score = _score_lines(submission[\"affected_lines\"],\
      \ _current.get(\"bug_lines\", []))\n\n    # Weighted combination\n    raw =\
      \ (0.50 * cat_score + 0.25 * expl_score + 0.10 * sev_score + 0.15 * line_score)\n\
      \    hint_penalty = 0.7 if _hints_used else 1.0\n    final = round(raw * hint_penalty,\
      \ 4)\n\n    yield EvaluationResult(\n        reward=final,\n        done=True,\n\
      \        content=(\n            f\"Submitted: {submission['vulnerability_type']}\
      \ \"\n            f\"(expected: {_current['canonical_category']})\\n\"\n   \
      \         f\"Scores \u2014 category: {cat_score:.2f}, explanation: {expl_score:.2f},\
      \ \"\n            f\"severity: {sev_score:.2f}, lines: {line_score:.2f}\\n\"\
      \n            f\"Hint penalty: {hint_penalty}, Final reward: {final}\"\n   \
      \     ),\n        subscores=[\n            SubScore(name=\"category_match\"\
      , weight=0.50, value=cat_score),\n            SubScore(name=\"explanation_quality\"\
      , weight=0.25, value=expl_score),\n            SubScore(name=\"severity_match\"\
      , weight=0.10, value=sev_score),\n            SubScore(name=\"line_accuracy\"\
      , weight=0.15, value=line_score),\n        ],\n        info={\n            \"\
      scenario_id\": _current[\"id\"],\n            \"canonical_category\": _current[\"\
      canonical_category\"],\n            \"difficulty\": _current[\"difficulty\"\
      ],\n            \"hints_used\": _hints_used,\n            \"code_read\": _code_read,\n\
      \            \"submitted_type\": submission[\"vulnerability_type\"],\n     \
      \       \"submitted_severity\": submission[\"severity\"],\n            \"submitted_lines\"\
      : submission[\"affected_lines\"],\n            \"ground_truth_lines\": _current.get(\"\
      bug_lines\", []),\n        },\n    )\n"
    arguments:
    - name: scenario_id
      required: false
      default: ''
      type: string
    _fastmcp:
      tags: []
