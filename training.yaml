# Solidity Vulnerability Detection — Training Configuration
# =========================================================
# Qwen3.5-9B trained to detect Solidity smart contract vulnerabilities.
# Uses SkyRL (via TrajGym) instead of SLIME for the Online RL stage.
#
# Key differences from TrajGym's CTF configs:
#   - Custom env (skyrl_env.SolidityVulnEnv) replaces TrajGymTextEnv
#   - 5-signal deterministic reward replaces flag-capture reward
#   - No Docker/filesystem — all tools are pure Python JSON lookups
#   - Shorter episodes (max 10 turns vs 60 for CTF)
#
# Architecture: Qwen3_5ForConditionalGeneration (text-only path)
#   32 layers: [3x Linear (Gated DeltaNet) + 1x Full Attention] x 8
#   Hidden: 4096, Intermediate: 12288
#   Tool calling: qwen3_coder XML | Reasoning: <think>/</think>
#
# Hardware: 2x 80GB+ GPUs (GPU 0: vLLM, GPU 1: FSDP2 trainer)

model:
  name: "Qwen/Qwen3-8B"
  max_seq_length: 32768
  load_in_4bit: false
  load_in_8bit: false

lora:
  r: 128
  alpha: 256
  dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_rslora: false

sft:
  epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  warmup_steps: 5
  weight_decay: 0.01
  lr_scheduler_type: cosine
  packing: true
  # SDPA required — FA2 crashes with gradient checkpointing on Qwen3.5
  flash_attn: false
  gradient_checkpointing: true

online_rl:
  epochs: 1
  batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 5.0e-6
  warmup_ratio: 0.10
  beta: 0.0
  loss_type: dapo
  num_generations: 8
  advantage_estimator: rloo

  # Episode length — Solidity audits are short (read code, maybe context, submit)
  max_tool_calling_iterations: 10
  max_completion_length: 8192
  max_prompt_length: 16384
  vllm_max_model_len: 65536

  # No horizon schedule needed — episodes are already short
  horizon_schedule: null

  # Quality filters
  hard_mask_statuses: []  # No infra issues (all tools are in-memory)
  positive_only_until_step: 50
  positive_only_reward_floor: 0.0

  # Generation params
  generation_temperature: 0.70
  generation_top_p: 0.95
  generation_top_k: 20
  generation_min_p: 0.0
  generation_stop:
    - "</tool_call>"
    - "<|im_end|>"

  # vLLM settings
  use_vllm: true
  vllm_mode: server
  vllm_server_url: null
  gpu_memory_utilization: 0.85
  max_num_seqs: 8
  max_num_batched_tokens: 65536

  # Environment — use our custom SolidityVulnEnv instead of TrajGymTextEnv
  env_class: "skyrl_env.SolidityVulnEnv"
  max_env_workers: 40

  # Tool call format — qwen3_coder for Qwen3.5
  tool_call_format: qwen3_coder
  strip_think: true
  native_tool_schemas: false

  # Qwen3.5 specific
  enforce_eager: true
  vllm_language_model_only: true
  vllm_attention_backend: "TRITON_ATTN"
  require_fast_linear_attention: true

  # Reward: all handled by SolidityVulnEnv's deterministic scorer
  step_wise_trajectories: false

  max_grad_norm: 1.0
  epsilon_high: 0.28
  weight_decay: 0.1
  scale_rewards: false
  zero_variance_filter: true

# Reward config — intentionally empty.
# SolidityVulnEnv computes reward internally using the 5-signal scorer
# from env.py. TrajGym's flag-capture reward is not used.
reward: {}

output:
  save_steps: 25
  logging_steps: 1
  report_to: tensorboard

online_rl_logging:
  enable_trajectory_logging: true
