# Solidity Vulnerability Detection — Training Configuration
# =========================================================
# Qwen3-8B trained to detect Solidity smart contract vulnerabilities.
# Uses SkyRL RLOO for online RL with multi-turn tool use.
#
# Architecture: Qwen3ForCausalLM (text-only, instruct model)
# Hardware: 8x H100 80GB (all colocated: vLLM + FSDP2 trainer)
#
# IMPORTANT: Keys under `algorithm:` and `generator:` are passed directly
# to SkyRL as Hydra overrides. Use SkyRL's actual field names — see
# skyrl/train/config/config.py for the full list.

model:
  name: "Qwen/Qwen3-8B"
  max_seq_length: 32768
  load_in_4bit: false
  load_in_8bit: false

lora:
  r: 64
  alpha: 128
  dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_rslora: false

sft:
  epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  warmup_steps: 5
  weight_decay: 0.01
  lr_scheduler_type: cosine
  packing: true
  flash_attn: false
  gradient_checkpointing: true

online_rl:
  # --- Our config (consumed by build_config) ---
  epochs: 1
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6
  warmup_ratio: 0.10
  num_generations: 4       # 6 caused vLLM OOM after eval; 4 was stable for 350 steps in v2
  max_tool_calling_iterations: 10
  max_completion_length: 8192
  max_prompt_length: 16384
  strip_think: true

  # --- trainer.algorithm.* (passed directly to SkyRL) ---
  # See SkyRL skyrl/train/config/config.py AlgorithmConfig
  algorithm:
    advantage_estimator: rloo
    use_kl_loss: false
    use_kl_in_reward: false
    kl_loss_coef: 0.001
    # Entropy regularization — CRITICAL to prevent mode collapse
    use_entropy_loss: true
    entropy_loss_coef: 0.001
    # Clipping
    eps_clip_high: 0.28    # DAPO-style asymmetric — wider upward for exploration
    eps_clip_low: 0.2
    policy_loss_type: regular
    zero_variance_filter: true

  # --- generator.* (passed directly to SkyRL) ---
  # See SkyRL skyrl/train/config/config.py GeneratorConfig
  generator:
    batched: false
    sampling_params:
      temperature: 0.90
      top_p: 0.95
      top_k: 50
      stop: ["</tool_call>", "<|im_end|>"]
    inference_engine:
      backend: vllm
      run_engines_locally: true
      weight_sync_backend: nccl
      async_engine: true
      gpu_memory_utilization: 0.85
      tensor_parallel_size: 1

  # --- trainer.policy.optimizer_config.* (passed directly to SkyRL) ---
  optimizer:
    max_grad_norm: 1.0

output:
  save_steps: 25
  logging_steps: 1
  report_to: tensorboard
